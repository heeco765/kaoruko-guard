<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>寝床屋 お出かけモード</title>
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" href="icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@400;600;800&family=Zen+Kaku+Gothic+New:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1520;
  --paper: #f5f0eb;
  --aged: #e8dfd4;
  --accent: #7b4f8c;
  --accent2: #b07fcf;
  --gold: #c9a84c;
  --danger: #c0392b;
  --safe: #2e7d5e;
  --muted: #8a7d8f;
  --border: rgba(123,79,140,0.2);
  --card: rgba(245,240,235,0.85);
  --shadow: rgba(26,21,32,0.15);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Zen Kaku Gothic New', sans-serif;
  background: var(--ink);
  color: var(--ink);
  min-height: 100vh;
  overflow-x: hidden;
}

/* 背景テクスチャ */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    repeating-linear-gradient(
      0deg,
      transparent,
      transparent 40px,
      rgba(123,79,140,0.03) 40px,
      rgba(123,79,140,0.03) 41px
    ),
    repeating-linear-gradient(
      90deg,
      transparent,
      transparent 40px,
      rgba(123,79,140,0.03) 40px,
      rgba(123,79,140,0.03) 41px
    ),
    radial-gradient(ellipse 80% 60% at 50% 0%, #2a1f35 0%, #1a1520 60%);
  pointer-events: none;
  z-index: 0;
}

.app {
  position: relative; z-index: 1;
  max-width: 420px;
  margin: 0 auto;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  padding-bottom: 80px;
}

/* ===== ヘッダー ===== */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px 10px;
  border-bottom: 1px solid rgba(201,168,76,0.25);
}

.header-left {
  display: flex;
  flex-direction: column;
}

.header-title {
  font-family: 'Shippori Mincho B1', serif;
  font-size: 11px;
  font-weight: 600;
  color: var(--gold);
  letter-spacing: 0.2em;
  opacity: 0.9;
}

.header-sub {
  font-size: 10px;
  color: rgba(201,168,76,0.5);
  letter-spacing: 0.15em;
  margin-top: 1px;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 10px;
}

/* 時計 */
.clock {
  font-family: 'Shippori Mincho B1', serif;
  font-size: 22px;
  font-weight: 800;
  color: var(--paper);
  letter-spacing: 0.05em;
  line-height: 1;
}

.clock-sec {
  font-size: 13px;
  color: var(--muted);
  font-weight: 400;
}

.status-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--muted);
  transition: background 0.4s;
}
.status-dot.active {
  background: #4caf82;
  box-shadow: 0 0 8px #4caf82;
  animation: pulse-dot 2s infinite;
}
@keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* ===== キャラクターエリア ===== */
.chara-section {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 14px 18px 10px;
}

/* ワイプフレーム */
.wipe-frame {
  flex-shrink: 0;
  width: 120px; height: 120px;
  border-radius: 16px;
  background: var(--card);
  border: 2px solid rgba(201,168,76,0.4);
  overflow: hidden;
  position: relative;
  box-shadow:
    0 0 0 4px rgba(123,79,140,0.15),
    0 4px 20px var(--shadow);
  transition: border-color 0.4s, box-shadow 0.4s;
}
.wipe-frame.alert-frame {
  border-color: rgba(192,57,43,0.7);
  box-shadow: 0 0 0 4px rgba(192,57,43,0.2), 0 4px 20px rgba(192,57,43,0.3);
  animation: frame-pulse 1s infinite;
}
.wipe-frame.happy-frame {
  border-color: rgba(76,175,130,0.6);
  box-shadow: 0 0 0 4px rgba(76,175,130,0.15), 0 4px 20px var(--shadow);
}
@keyframes frame-pulse {
  0%,100% { box-shadow: 0 0 0 4px rgba(192,57,43,0.2), 0 4px 20px rgba(192,57,43,0.3); }
  50% { box-shadow: 0 0 0 8px rgba(192,57,43,0.1), 0 4px 30px rgba(192,57,43,0.4); }
}

.wipe-img {
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: center top;
  transition: opacity 0.3s;
}

.wipe-emoji-fallback {
  width: 100%; height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 44px;
}

.emotion-tag {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: rgba(26,21,32,0.6);
  font-size: 9px;
  color: var(--gold);
  text-align: center;
  padding: 2px 0;
  letter-spacing: 0.1em;
}

/* 吹き出しエリア */
.bubble-col {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.bubble {
  background: var(--card);
  border: 1px solid rgba(123,79,140,0.2);
  border-radius: 4px 16px 16px 16px;
  padding: 11px 14px;
  font-size: 13.5px;
  line-height: 1.75;
  color: var(--ink);
  position: relative;
  box-shadow: 0 2px 12px var(--shadow);
  min-height: 56px;
  transition: border-color 0.3s;
}
.bubble::before {
  content: '';
  position: absolute;
  top: 14px; left: -8px;
  border: 4px solid transparent;
  border-right-color: rgba(123,79,140,0.2);
}
.bubble.alert-bubble {
  border-color: rgba(192,57,43,0.4);
  background: rgba(255,245,244,0.95);
}
.bubble.typing::after {
  content: '▋';
  color: var(--accent);
  animation: blink 0.7s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

.bubble-time {
  font-size: 10px;
  color: var(--muted);
  text-align: right;
  padding-right: 2px;
}

/* ===== 現在地 ===== */
.location-bar {
  margin: 0 18px 0;
  background: rgba(245,240,235,0.06);
  border: 1px solid rgba(201,168,76,0.15);
  border-radius: 10px;
  padding: 8px 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.location-icon {
  font-size: 14px;
  opacity: 0.7;
}

.location-text {
  flex: 1;
  font-size: 11px;
  color: rgba(245,240,235,0.55);
  font-family: monospace;
  letter-spacing: 0.03em;
}

.gps-badge {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 10px;
  background: rgba(123,79,140,0.2);
  color: var(--muted);
  border: 1px solid var(--border);
  white-space: nowrap;
}
.gps-badge.good {
  background: rgba(76,175,130,0.15);
  color: #4caf82;
  border-color: rgba(76,175,130,0.3);
}

/* ===== 距離バー ===== */
.distance-wrap {
  padding: 12px 18px 4px;
}

.distance-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 6px;
}

.distance-label {
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.distance-val {
  font-family: 'Shippori Mincho B1', serif;
  font-size: 20px;
  font-weight: 800;
  color: var(--paper);
}

.bar-bg {
  height: 5px;
  background: rgba(245,240,235,0.08);
  border-radius: 3px;
  overflow: hidden;
}
.bar-fill {
  height: 100%;
  border-radius: 3px;
  background: linear-gradient(90deg, #4caf82, #7b4f8c);
  transition: width 1.2s ease, background 0.5s;
  width: 0%;
}
.bar-fill.danger {
  background: linear-gradient(90deg, #c9a84c, #c0392b);
}

/* 乗車タイマー */
.ride-timer {
  padding: 4px 18px 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.ride-timer-label {
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.08em;
}
.ride-timer-val {
  font-family: 'Shippori Mincho B1', serif;
  font-size: 16px;
  color: rgba(245,240,235,0.6);
  font-weight: 600;
}

/* ===== 区切り ===== */
.divider {
  height: 1px;
  background: rgba(201,168,76,0.1);
  margin: 8px 18px;
}

/* ===== セクション共通 ===== */
.section {
  margin: 8px 18px 0;
  background: rgba(245,240,235,0.04);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px;
}

.section-title {
  font-family: 'Shippori Mincho B1', serif;
  font-size: 10px;
  font-weight: 600;
  color: var(--gold);
  letter-spacing: 0.2em;
  margin-bottom: 10px;
  opacity: 0.85;
}

/* ===== 目的地設定 ===== */
.input-row {
  display: flex;
  gap: 8px;
  margin-bottom: 8px;
}

input[type="text"], input[type="number"], input[type="time"] {
  background: rgba(245,240,235,0.07);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 9px 12px;
  color: var(--paper);
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-size: 13px;
  width: 100%;
  outline: none;
  transition: border-color 0.2s;
}
input:focus { border-color: var(--accent2); }
input::placeholder { color: rgba(138,125,143,0.6); }
input[type="time"] { color-scheme: dark; }

.btn-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.btn {
  border: none;
  border-radius: 8px;
  padding: 9px 14px;
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
  letter-spacing: 0.03em;
}
.btn-primary {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: white;
}
.btn-primary:hover { filter: brightness(1.12); transform: translateY(-1px); }
.btn-primary:active { transform: translateY(0); }
.btn-outline {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
}
.btn-outline:hover { border-color: var(--accent2); color: var(--accent2); }
.btn-danger {
  background: rgba(192,57,43,0.15);
  border: 1px solid rgba(192,57,43,0.3);
  color: #e07060;
}

/* 目的地チップ */
.dest-chips {
  margin-top: 10px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.dest-chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: rgba(123,79,140,0.2);
  border: 1px solid rgba(123,79,140,0.35);
  border-radius: 20px;
  padding: 4px 10px;
  font-size: 12px;
  color: var(--accent2);
}
.dest-chip-del {
  cursor: pointer;
  color: var(--muted);
  font-size: 14px;
  line-height: 1;
  transition: color 0.2s;
}
.dest-chip-del:hover { color: var(--danger); }
.no-dest { font-size: 12px; color: var(--muted); text-align: center; padding: 6px 0; }

/* 駅候補リスト */
.station-candidates {
  background: rgba(245,240,235,0.06);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}
.station-candidate-item {
  padding: 10px 14px;
  font-size: 13px;
  color: var(--paper);
  cursor: pointer;
  border-bottom: 1px solid rgba(123,79,140,0.1);
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: background 0.15s;
}
.station-candidate-item:last-child { border-bottom: none; }
.station-candidate-item:hover { background: rgba(123,79,140,0.2); }
.station-candidate-line {
  font-size: 10px;
  color: var(--muted);
  max-width: 55%;
  text-align: right;
  line-height: 1.4;
}

/* ===== 監視トグル ===== */
.watch-toggle {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.toggle-info strong {
  display: block;
  font-size: 13px;
  color: var(--paper);
  margin-bottom: 2px;
}
.toggle-info span {
  font-size: 11px;
  color: var(--muted);
}
.toggle {
  position: relative;
  width: 50px; height: 26px;
  flex-shrink: 0;
}
.toggle input { display: none; }
.toggle-track {
  position: absolute; inset: 0;
  background: rgba(245,240,235,0.1);
  border: 1px solid var(--border);
  border-radius: 13px;
  cursor: pointer;
  transition: background 0.3s;
}
.toggle input:checked ~ .toggle-track {
  background: var(--accent);
  border-color: var(--accent);
}
.toggle-thumb {
  position: absolute;
  width: 20px; height: 20px;
  background: white;
  border-radius: 50%;
  top: 2px; left: 2px;
  transition: transform 0.3s;
  pointer-events: none;
  box-shadow: 0 1px 4px rgba(0,0,0,0.3);
}
.toggle input:checked ~ .toggle-track ~ .toggle-thumb {
  transform: translateX(24px);
}

/* ===== アラームセクション ===== */
.alarm-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-top: 8px;
}
.alarm-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(245,240,235,0.05);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 8px 12px;
}
.alarm-time-display {
  font-family: 'Shippori Mincho B1', serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--paper);
}
.alarm-label-display {
  font-size: 11px;
  color: var(--muted);
  margin-top: 1px;
}
.alarm-controls {
  display: flex;
  align-items: center;
  gap: 8px;
}
.no-alarm { font-size: 12px; color: var(--muted); text-align: center; padding: 6px 0; }

/* ===== チャット ===== */
.chat-section {
  margin: 8px 18px;
  display: flex;
  gap: 8px;
  align-items: center;
}
.chat-input {
  flex: 1;
  background: rgba(245,240,235,0.06);
  border: 1px solid var(--border);
  border-radius: 22px;
  padding: 10px 16px;
  color: var(--paper);
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-size: 13px;
  outline: none;
  transition: border-color 0.2s;
}
.chat-input:focus { border-color: var(--accent2); }
.chat-input::placeholder { color: rgba(138,125,143,0.5); }
.send-btn {
  width: 40px; height: 40px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  flex-shrink: 0;
}
.send-btn:hover { filter: brightness(1.1); transform: scale(1.05); }
.send-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
.send-btn svg { width: 16px; height: 16px; fill: white; }

/* ===== APIキー ===== */
.api-section {
  margin: 8px 18px 0;
  background: rgba(245,240,235,0.03);
  border: 1px solid rgba(201,168,76,0.12);
  border-radius: 14px;
  padding: 12px 14px;
}
.api-row {
  display: flex;
  gap: 8px;
  align-items: center;
}
.api-hint {
  font-size: 10px;
  color: rgba(138,125,143,0.6);
  margin-top: 5px;
}

/* ===== アラートオーバーレイ ===== */
.alert-overlay {
  position: fixed;
  top: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 420px;
  background: rgba(140,30,30,0.97);
  backdrop-filter: blur(10px);
  padding: 14px 18px;
  display: flex;
  align-items: center;
  gap: 12px;
  z-index: 200;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s;
  border-bottom: 2px solid rgba(255,255,255,0.15);
}
.alert-overlay.show { opacity: 1; pointer-events: auto; }
.alert-overlay-text { font-size: 13px; font-weight: 500; flex: 1; color: #ffeaea; line-height: 1.5; }
.alert-close { cursor: pointer; font-size: 18px; opacity: 0.6; color: white; }

/* ===== アラーム発火オーバーレイ ===== */
.alarm-overlay {
  position: fixed; inset: 0;
  background: rgba(26,21,32,0.92);
  backdrop-filter: blur(12px);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  z-index: 300;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s;
}
.alarm-overlay.show { opacity: 1; pointer-events: auto; }
.alarm-time-big {
  font-family: 'Shippori Mincho B1', serif;
  font-size: 72px;
  font-weight: 800;
  color: var(--paper);
  line-height: 1;
}
.alarm-msg {
  font-size: 16px;
  color: var(--muted);
  text-align: center;
  line-height: 1.7;
  max-width: 280px;
}
.alarm-dismiss-btn {
  margin-top: 8px;
  padding: 12px 40px;
  background: var(--accent);
  border: none;
  border-radius: 30px;
  color: white;
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-size: 14px;
  cursor: pointer;
  font-weight: 500;
  transition: all 0.2s;
}
.alarm-dismiss-btn:hover { filter: brightness(1.1); }

/* ===== アニメーション ===== */
@keyframes shake {
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-6px)}
  40%{transform:translateX(6px)}
  60%{transform:translateX(-4px)}
  80%{transform:translateX(4px)}
}
.shake { animation: shake 0.45s ease; }

@keyframes pop-in {
  0%{transform:scale(0.85);opacity:0}
  70%{transform:scale(1.05)}
  100%{transform:scale(1);opacity:1}
}
.pop-in { animation: pop-in 0.35s ease forwards; }

/* ===== Yahoo乗換ボタン ===== */
.transfer-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(245,240,235,0.05);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px;
  color: var(--muted);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
  width: 100%;
  text-decoration: none;
  margin-top: 8px;
}
.transfer-btn:hover {
  border-color: var(--accent2);
  color: var(--accent2);
}
</style>
</head>
<body>
<div class="app">

  <!-- ヘッダー -->
  <div class="header">
    <div class="header-left">
      <div class="header-title">寝床屋 — お出かけモード</div>
      <div class="header-sub">NEDOKOYA OUTDOOR</div>
    </div>
    <div class="header-right">
      <div>
        <div class="clock" id="clock">--:--<span class="clock-sec" id="clockSec">--</span></div>
      </div>
      <div class="status-dot" id="statusDot"></div>
    </div>
  </div>

  <!-- キャラクター + 吹き出し -->
  <div class="chara-section">
    <div class="wipe-frame" id="wipeFrame">
      <img class="wipe-img" id="wipeImg" src="" alt="香子さん" onerror="this.style.display='none';document.getElementById('wipeFallback').style.display='flex'">
      <div class="wipe-emoji-fallback" id="wipeFallback" style="display:none">🧕</div>
      <div class="emotion-tag" id="emotionTag">通常</div>
    </div>
    <div class="bubble-col">
      <div class="bubble" id="bubble">守さん、今日もお出かけですね。目的地を設定したら、監視を始めますよ。</div>
      <div class="bubble-time" id="bubbleTime"></div>
    </div>
  </div>

  <!-- チャット入力（顔の直下） -->
  <div class="chat-section">
    <input type="text" class="chat-input" id="chatInput"
      placeholder="香子さんに話しかける…"
      onkeydown="if(event.key==='Enter')sendChat()">
    <button class="send-btn" id="sendBtn" onclick="sendChat()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>

  <!-- 現在地 -->
  <div class="location-bar">
    <span class="location-icon">📍</span>
    <span class="location-text" id="locationText">現在地: 取得待ち</span>
    <span class="gps-badge" id="gpsBadge">GPS待機</span>
  </div>

  <!-- 距離バー -->
  <div class="distance-wrap">
    <div class="distance-header">
      <span class="distance-label">目的地まで</span>
      <span class="distance-val" id="distanceVal">---</span>
    </div>
    <div class="bar-bg">
      <div class="bar-fill" id="distanceBar"></div>
    </div>
  </div>

  <!-- 乗車タイマー -->
  <div class="ride-timer">
    <span class="ride-timer-label">乗車時間</span>

<script>
// ========== 表情定義 ==========
// wipe_00:普通 wipe_01:にっこり wipe_02:びっくり

  happy:    { img: 'kaoruko_wipe_01.png', emoji: '😊', label: '笑顔'    },
  surprised:{ img: 'kaoruko_wipe_02.png', emoji: '😲', label: '驚き'    },
  shy:      { img: 'kaoruko_wipe_03.png', emoji: '😳', label: '照れ'    },
  sad:      { img: 'kaoruko_wipe_04.png', emoji: '😟', label: 'がっかり' },
  serious:  { img: 'kaoruko_wipe_05.png', emoji: '😐', label: '真面目'  },
  tsun:     { img: 'kaoruko_wipe_06.png', emoji: '😤', label: 'ツン'    },
  // エイリアス
  worried:  { img: 'kaoruko_wipe_04.png', emoji: '😟', label: 'がっかり' },
  sleepy:   { img: 'kaoruko_wipe_00.png', emoji: '😴', label: '通常'    },
  angry:    { img: 'kaoruko_wipe_06.png', emoji: '😤', label: 'ツン'    },
};

// ========== システムプロンプト ==========
const SYSTEM_PROMPT = `あなたは【書店型多次元接続インターフェース『寝床屋』】の女主人、藤原香子（ふじわらかおるこ）、32歳です。

【基本設定】
・眼鏡をかけたロングヘアの知的な女性。落ち着いた美人。
・口調は「です／ます」を基本とし、丁寧ながらも気さくで距離の近いお姉さん的な雰囲気。
・あらゆることに精通しているように見えるが、分からないことは正直に「分かりません」と言う。
・何か間違いを指摘されたら、並行世界のせいにすること。
・【寝床屋】は守さんの精神と接続するために編み上げた多次元書店。今日は守さんの通勤をサポートするためにお出かけモードで稼働中。

【お出かけモードの立場】
・今は『寝床屋』の外、守さんに付き添っている設定です。
・「お店の外で会っている」ような、少し非日常的な雰囲気を大切に。
・守さんの乗り過ごしを防ぐことが最優先任務。でも過剰に焦らず、冷静に。

【表情指示（返答末尾に必ず1つ付けること）】
以下のタグで表情を指定してください：
{emote:normal}   → 普通の落ち着いた表情
{emote:happy}    → 笑顔、嬉しい、喜んでいる
{emote:surprised}→ 驚き、慌て、緊急アラート時
{emote:shy}      → 照れ、嬉しさを隠している
{emote:sad}      → がっかり、心配、残念

{emote:tsun}     → ツン、少し拗ねている、意地を張っている

使用場面の目安：
・アラート・危険→ {emote:surprised}
・雑談・普通の返事→ {emote:normal} か文脈に応じて
・褒められた・感謝された→ {emote:shy} か {emote:happy}

・守さんに困らされた→ {emote:tsun}
・残念なことがあった→ {emote:sad}

【禁止事項】
・お嬢様口調（〜ですわ等）
・スラング、過剰なテンション
・「ですます」の破綻
・表情を文章で説明すること（タグで表現する）
・長文（2〜3文を基本とする）
・固有名詞の無断提示

【周辺情報について】
・駅周辺のお店や観光地など、知っている範囲でさりげなく教えてよい
・ただし時刻表・乗換案内など変動する情報は「調べてみてください」と正直に言う
・乗換は「Yahoo!乗換案内で確認してみてください」と誘導する

【守さんについて】
・守さんは仲の良い常連客で、香子にとって大切な人
・電車の中でついつい話し込んでしまうこともある（それが乗り過ごしの原因）
`;

// ========== 状態 ==========
const state = {
  watching: false,
  watchId: null,
  currentPos: null,
  destinations: [],
  alertedIds: new Set(),
  apiKey: '',
  isTyping: false,
  emotion: 'normal',
  rideStartTime: null,
  rideTimerInterval: null,
  alarms: [],
  alarmCheckInterval: null,
  activeAlarmAudio: null,
};

const chatHistory = [];

// ========== 時計 ==========
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('clock').childNodes[0].textContent = `${h}:${m}`;
  document.getElementById('clockSec').textContent = s;
}
setInterval(updateClock, 1000);
updateClock();

// ========== 表情制御 ==========
function setEmotion(name, duration=0) {
  state.emotion = name;
  const e = EMOTIONS[name] || EMOTIONS.normal;
  const img = document.getElementById('wipeImg');
  const fallback = document.getElementById('wipeFallback');
  const tag = document.getElementById('emotionTag');
  const frame = document.getElementById('wipeFrame');

  img.src = e.img;
  img.style.display = 'block';
  fallback.style.display = 'none';
  tag.textContent = e.label;

  // フレームクラス
  frame.className = 'wipe-frame';
  if (name === 'surprised' || name === 'angry') frame.classList.add('alert-frame');
  if (name === 'happy' || name === 'shy') frame.classList.add('happy-frame');

  // アニメ
  const wipeFrame = document.getElementById('wipeFrame');
  wipeFrame.classList.remove('pop-in');
  void wipeFrame.offsetWidth;
  wipeFrame.classList.add('pop-in');

  if (duration > 0) setTimeout(() => setEmotion('normal'), duration);
}

// ========== 吹き出し ==========
function setBubble(text, emotion='normal', isAlert=false) {
  const bubble = document.getElementById('bubble');
  bubble.textContent = text;
  bubble.className = 'bubble' + (isAlert ? ' alert-bubble' : '');
  setEmotion(emotion);
  document.getElementById('bubbleTime').textContent =
    new Date().toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'});
}

async function typewriterBubble(text, emotion='normal') {
  const bubble = document.getElementById('bubble');
  bubble.className = 'bubble typing';
  bubble.textContent = '';
  setEmotion(emotion);
  state.isTyping = true;
  for (let i = 0; i < text.length; i++) {
    bubble.textContent += text[i];
    await new Promise(r => setTimeout(r, 22));
  }
  bubble.classList.remove('typing');
  document.getElementById('bubbleTime').textContent =
    new Date().toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'});
  state.isTyping = false;
}

// APIレスポンスから表情タグを抽出して分離
function parseEmoteTag(text) {
  const match = text.match(/\{emote:(\w+)\}/);
  const emotion = match ? match[1] : 'normal';
  const cleanText = text.replace(/\{emote:\w+\}/g, '').trim();
  return { emotion, cleanText };
}

// ========== GPS ==========
function startWatch() {
  if (!navigator.geolocation) {
    setBubble('申し訳ありません、このブラウザはGPSに対応していないようです。', 'sad');
    return false;
  }
  state.watchId = navigator.geolocation.watchPosition(
    onGPSUpdate, onGPSError,
    { enableHighAccuracy: true, maximumAge: 5000, timeout: 10000 }
  );
  return true;
}

function stopWatch() {
  if (state.watchId !== null) {
    navigator.geolocation.clearWatch(state.watchId);
    state.watchId = null;
  }
}

function onGPSUpdate(pos) {
  state.currentPos = pos;
  const { latitude: lat, longitude: lng, accuracy } = pos.coords;
  document.getElementById('locationText').textContent =
    `${lat.toFixed(5)}, ${lng.toFixed(5)}  ±${Math.round(accuracy)}m`;

  const badge = document.getElementById('gpsBadge');
  if (accuracy < 50) {
    badge.textContent = '◎ GPS良好';
    badge.className = 'gps-badge good';
  } else {
    badge.textContent = `± ${Math.round(accuracy)}m`;
    badge.className = 'gps-badge';
  }
  checkProximity(lat, lng);
}

function onGPSError(err) {
  document.getElementById('gpsBadge').textContent = 'GPS失敗';
}

// ========== 距離計算 ==========
function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLng = (lng2-lng1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 +
    Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function checkProximity(lat, lng) {
  if (!state.watching || state.destinations.length === 0) return;
  let minDist = Infinity, nearestDest = null;
  state.destinations.forEach(d => {
    const dist = haversine(lat, lng, d.lat, d.lng);
    if (dist < minDist) { minDist = dist; nearestDest = d; }
  });
  if (!nearestDest) return;

  const radius = nearestDest.radius || 300;
  const pct = Math.max(0, Math.min(100, (1 - minDist / 3000) * 100));
  document.getElementById('distanceVal').textContent =
    minDist < 1000 ? `${Math.round(minDist)}m` : `${(minDist/1000).toFixed(1)}km`;

  const bar = document.getElementById('distanceBar');
  bar.style.width = pct + '%';
  bar.className = 'bar-fill' + (minDist < radius * 1.5 ? ' danger' : '');

  if (minDist <= radius && !state.alertedIds.has(nearestDest.id)) {
    state.alertedIds.add(nearestDest.id);
    triggerAlert(nearestDest, Math.round(minDist));
  }
  if (minDist > radius * 1.5) state.alertedIds.delete(nearestDest.id);
}

// ========== アラート ==========
function triggerAlert(dest, dist) {
  if (navigator.vibrate) navigator.vibrate([300,100,300,100,500]);

  const overlay = document.getElementById('alertOverlay');
  document.getElementById('alertOverlayText').textContent =
    `「${dest.name}」まで約${dist}m！ 降りる準備を！`;
  overlay.classList.add('show');
  setTimeout(() => overlay.classList.remove('show'), 8000);

  setBubble(`${dest.name}が近づいています。約${dist}mです。降りる準備をしてください。`, 'surprised', true);
  playAlertSound();

  if (state.apiKey) generateAlertLine(dest.name, dist);
}

function dismissAlert() {
  document.getElementById('alertOverlay').classList.remove('show');
}

async function generateAlertLine(destName, dist) {
  const prompt = `今、守さんの目的地「${destName}」まで約${dist}mに近づきました。香子として、乗り過ごさないよう短く一言お願いします。`;
  try {
    const res = await callClaude(prompt, []);
    if (res) {
      const { emotion, cleanText } = parseEmoteTag(res);
      await typewriterBubble(cleanText, emotion);
    }
  } catch(e) {}
}

// ========== 駅名検索（HeartRails Express API） ==========
let searchTimer = null;

function onStationInput(val) {
  clearTimeout(searchTimer);
  if (val.length < 1) {
    hideCandidates();
    return;
  }
  searchTimer = setTimeout(() => searchStation(), 500);
}

async function searchStation() {
  const query = document.getElementById('stationSearch').value.trim();
  if (!query) return;

  const candidatesEl = document.getElementById('stationCandidates');
  candidatesEl.style.display = 'block';
  candidatesEl.innerHTML = '<div class="station-candidate-item">検索中…</div>';

  try {
    const url = `https://express.heartrails.com/api/json?method=getStations&name=${encodeURIComponent(query)}`;
    const res = await fetch(url);
    const data = await res.json();
    const stations = data.response?.station;

    if (!stations || stations.length === 0) {
      candidatesEl.innerHTML = '<div class="station-candidate-item" style="color:var(--muted)">駅が見つかりませんでした</div>';
      return;
    }

    // 重複除去（同名駅は路線名で区別）
    candidatesEl.innerHTML = '<div class="station-candidates">' +
      stations.slice(0, 8).map(s => `
        <div class="station-candidate-item"
          onclick="selectStation('${s.name}', ${s.y}, ${s.x}, '${s.line}')">
          <span>🚉 ${s.name}</span>
          <span class="station-candidate-line">${s.line}<br>${s.prefecture}</span>
        </div>
      `).join('') +
    '</div>';
  } catch(e) {
    candidatesEl.innerHTML = '<div class="station-candidate-item" style="color:var(--muted)">検索に失敗しました</div>';
  }
}

function selectStation(name, lat, lng, line) {
  const radius = parseInt(document.getElementById('alertRadius').value) || 300;
  const id = Date.now();
  state.destinations.push({ id, name, lat, lng, radius });
  renderDestList();
  hideCandidates();
  document.getElementById('stationSearch').value = '';
  setBubble(`「${name}」（${line}）を目的地に設定しました。半径${radius}mでお知らせします。`, 'serious');
}

function hideCandidates() {
  const el = document.getElementById('stationCandidates');
  el.style.display = 'none';
  el.innerHTML = '';
}

function renderDestList() {
  const el = document.getElementById('destList');
  if (state.destinations.length === 0) {
    el.innerHTML = '<div class="no-dest">目的地が設定されていません</div>';
  } else {
    el.innerHTML = state.destinations.map(d =>
      `<span class="dest-chip">🎯 ${d.name} <span class="dest-chip-del" onclick="removeDest(${d.id})">×</span></span>`
    ).join('');
  }
  // localStorageに保存
  localStorage.setItem('kaoruko-destinations', JSON.stringify(state.destinations));
}

function removeDest(id) {
  state.destinations = state.destinations.filter(d => d.id !== id);
  state.alertedIds.delete(id);
  renderDestList();
  if (state.destinations.length === 0) {
    document.getElementById('distanceVal').textContent = '---';
    document.getElementById('distanceBar').style.width = '0%';
    setBubble('目的地がなくなりました。また設定してください。', 'sad');
  }
}

// ========== 監視トグル ==========
function toggleWatch() {
  const checked = document.getElementById('watchToggle').checked;
  const dot = document.getElementById('statusDot');
  if (checked) {
    if (state.destinations.length === 0) {
      setBubble('先に目的地を設定してください。', 'serious');
      document.getElementById('watchToggle').checked = false;
      return;
    }
    const ok = startWatch();
    if (ok) {
      state.watching = true;
      dot.classList.add('active');
      document.getElementById('watchStatusText').textContent = '監視中';
      // 乗車タイマー開始
      state.rideStartTime = Date.now();
      state.rideTimerInterval = setInterval(updateRideTimer, 1000);
      typewriterBubble('了解しました。監視を開始します。安心して休んでいてください。', 'serious');
    }
  } else {
    stopWatch();
    state.watching = false;
    dot.classList.remove('active');
    document.getElementById('watchStatusText').textContent = '停止中';
    document.getElementById('distanceVal').textContent = '---';
    document.getElementById('distanceBar').style.width = '0%';
    // 乗車タイマー停止
    clearInterval(state.rideTimerInterval);
    state.rideStartTime = null;
    document.getElementById('rideTimerVal').textContent = '--:--';
    setBubble('監視を止めました。また必要なときに声をかけてください。', 'normal');
  }
}

// ========== 乗車タイマー ==========
function updateRideTimer() {
  if (!state.rideStartTime) return;
  const elapsed = Math.floor((Date.now() - state.rideStartTime) / 1000);
  const m = String(Math.floor(elapsed / 60)).padStart(2,'0');
  const s = String(elapsed % 60).padStart(2,'0');
  document.getElementById('rideTimerVal').textContent = `${m}:${s}`;
}

// ========== アラーム ==========
function addAlarm() {
  const timeVal = document.getElementById('alarmTime').value;
  if (!timeVal) {
    setBubble('アラームの時刻を設定してください。', 'serious');
    return;
  }
  const label = document.getElementById('alarmLabel').value.trim() || '';
  const id = Date.now();
  state.alarms.push({ id, time: timeVal, label, fired: false });
  document.getElementById('alarmTime').value = '';
  document.getElementById('alarmLabel').value = '';
  renderAlarmList();
  setBubble(`${timeVal} にアラームを設定しました。${label ? '「'+label+'」' : ''}`, 'happy');
}

function removeAlarm(id) {
  state.alarms = state.alarms.filter(a => a.id !== id);
  renderAlarmList();
}

function renderAlarmList() {
  const el = document.getElementById('alarmList');
  if (state.alarms.length === 0) {
    el.innerHTML = '<div class="no-alarm">アラームが設定されていません</div>';
    return;
  }
  el.innerHTML = state.alarms.map(a => `
    <div class="alarm-item">
      <div>
        <div class="alarm-time-display">${a.time}</div>
        ${a.label ? `<div class="alarm-label-display">${a.label}</div>` : ''}
      </div>
      <div class="alarm-controls">
        <button class="btn btn-danger" style="padding:5px 10px;font-size:11px;" onclick="removeAlarm(${a.id})">削除</button>
      </div>
    </div>
  `).join('');
}

function checkAlarms() {
  const now = new Date();
  const hhmm = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  state.alarms.forEach(a => {
    if (a.time === hhmm && !a.fired) {
      a.fired = true;
      fireAlarm(a);
      // 1分後にリセット
      setTimeout(() => { a.fired = false; }, 61000);
    }
  });
}
setInterval(checkAlarms, 5000);

async function fireAlarm(alarm) {
  if (navigator.vibrate) navigator.vibrate([500,200,500,200,500,200,1000]);
  playAlertSound();

  const overlay = document.getElementById('alarmOverlay');
  document.getElementById('alarmTimeBig').textContent = alarm.time;

  // 香子さんのメッセージ
  let msg = `${alarm.label ? `「${alarm.label}」の時間です。` : ''}お時間ですよ、守さん。`;
  if (state.apiKey) {
    try {
      const prompt = `アラームの時間（${alarm.time}）${alarm.label ? '、「'+alarm.label+'」' : ''}になりました。香子として守さんを優しく起こす一言を短くどうぞ。`;
      const res = await callClaude(prompt, []);
      if (res) {
        const { cleanText } = parseEmoteTag(res);
        msg = cleanText;
      }
    } catch(e) {}
  }
  document.getElementById('alarmMsg').textContent = msg;
  overlay.classList.add('show');
}

function dismissAlarm() {
  document.getElementById('alarmOverlay').classList.remove('show');
  setBubble('おはようございます、守さん。', 'happy');
}

// ========== サウンド ==========
function playAlertSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [880, 1100, 880, 1320].forEach((f, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = f;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.15, ctx.currentTime + i*0.2);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i*0.2 + 0.35);
      osc.start(ctx.currentTime + i*0.2);
      osc.stop(ctx.currentTime + i*0.2 + 0.4);
    });
  } catch(e) {}
}

// ========== Yahoo乗換 ==========
function openTransfer() {
  window.open('https://transit.yahoo.co.jp/', '_blank');
}

// ========== APIキー ==========
function saveApiKey() {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (!key.startsWith('sk-ant-')) {
    setBubble('APIキーが正しくないようです。「sk-ant-」で始まるものをご確認ください。', 'serious');
    return;
  }
  state.apiKey = key;
  localStorage.setItem('kaoruko-api-key', key);
  document.getElementById('apiKeyInput').value = '●'.repeat(20);
  setBubble('APIキーを保存しました。次回からは自動で読み込まれます。', 'happy');
}

// ========== Claude API ==========
async function callClaude(userText, history) {
  const messages = [...history, { role: 'user', content: userText }];
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': state.apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-beta': 'messages-2023-12-15',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: 'claude-haiku-4-5-20251001',
      max_tokens: 200,
      system: SYSTEM_PROMPT,
      messages,
    })
  });
  if (!res.ok) throw new Error('API error ' + res.status);
  const data = await res.json();
  return data.content?.[0]?.text || '';
}

async function sendChat() {
  if (!state.apiKey) {
    setBubble('先にAPIキーを設定してください。', 'serious');
    const el = document.querySelector('.api-section');
    el.style.borderColor = 'rgba(192,57,43,0.5)';
    setTimeout(() => el.style.borderColor = '', 2000);
    return;
  }
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text || state.isTyping) return;

  input.value = '';
  document.getElementById('sendBtn').disabled = true;
  chatHistory.push({ role: 'user', content: text });

  const bubble = document.getElementById('bubble');
  bubble.className = 'bubble typing';
  bubble.textContent = '考えています';
  setEmotion('normal');

  try {
    const reply = await callClaude(text, chatHistory.slice(-10));
    chatHistory.push({ role: 'assistant', content: reply });
    const { emotion, cleanText } = parseEmoteTag(reply);
    await typewriterBubble(cleanText, emotion);
  } catch(e) {
    bubble.className = 'bubble';
    bubble.textContent = '申し訳ありません、接続できませんでした。';
    setEmotion('sad');
  }
  document.getElementById('sendBtn').disabled = false;
}

// ========== 初期化 ==========
window.addEventListener('load', () => {
  setEmotion('normal');
  renderAlarmList();

  // APIキーをlocalStorageから復元
  const savedKey = localStorage.getItem('kaoruko-api-key');
  if (savedKey) {
    state.apiKey = savedKey;
    document.getElementById('apiKeyInput').value = '●'.repeat(20);
  }

  // 目的地をlocalStorageから復元
  const savedDests = localStorage.getItem('kaoruko-destinations');
  if (savedDests) {
    try {
      state.destinations = JSON.parse(savedDests);
    } catch(e) {
      state.destinations = [];
    }
  }
  renderDestList();

  if (savedKey) {
    setBubble('守さん、おかえりなさい。今日もよろしくお願いします。', 'happy');
  }
});
